const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const dist=(ax,ay,bx,by)=>Math.hypot(bx-ax,by-ay);
const ang=(ax,ay,bx,by)=>Math.atan2(by-ay,bx-ax);
const TAU=Math.PI*2;
// unseeded (combat/fx)
const rr=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rr(a,b+1));
const rp=arr=>arr[Math.floor(Math.random()*arr.length)];
const rc=p=>Math.random()<p;
// seeded (generation)
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
let R=mulberry32(1);
const srr=(a,b)=>a+R()*(b-a);
const sri=(a,b)=>Math.floor(srr(a,b+1));
const srp=arr=>arr[Math.floor(R()*arr.length)];
const src=p=>R()<p;
function shade(hex,f){ // f<0 darken, >0 lighten
 const n=parseInt(hex.slice(1),16);let r=n>>16,g=n>>8&255,b=n&255;
 if(f<0){r*=1+f;g*=1+f;b*=1+f}else{r+=(255-r)*f;g+=(255-g)*f;b+=(255-b)*f}
 return '#'+((1<<24)|(r&255?Math.round(r):0)<<16|(Math.round(g)&255)<<8|(Math.round(b)&255)).toString(16).slice(1);
}
function fmtNum(n){return n>=1000?(n/1000).toFixed(1)+'k':''+Math.floor(n)}

function lsGet(k){try{return localStorage.getItem(k)}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,v);return true}catch(e){return false}}
function lsDel(k){try{localStorage.removeItem(k)}catch(e){}}
function loadMeta(){
 meta=defaultMeta();
 const raw=lsGet(META_KEY);
 if(raw){try{const d=JSON.parse(raw);if(d&&d.v>=1){
   // shallow-merge each section so new fields survive old saves
   for(const k of ['unlocked','perks','best','stats','settings'])Object.assign(meta[k],d[k]||{});
   meta.gold=d.gold||0;
 }}catch(e){}}
}
function saveMeta(){lsSet(META_KEY,JSON.stringify(meta))}

function loadRun(){const raw=lsGet(RUN_KEY);if(!raw)return null;try{const d=JSON.parse(raw);return d&&d.v===2?d:null}catch(e){return null}}

function exportSave(){
 const s=btoa(unescape(encodeURIComponent(JSON.stringify({m:meta,r:loadRun()}))));
 try{if(navigator.clipboard)navigator.clipboard.writeText(s)}catch(e){}
 prompt('Copy your save code:',s);
}
function importSave(){
 const s=prompt('Paste save code:');if(!s)return;
 try{const d=JSON.parse(decodeURIComponent(escape(atob(s.trim()))));
  if(d.m){lsSet(META_KEY,JSON.stringify(d.m));if(d.r)lsSet(RUN_KEY,JSON.stringify(d.r));loadMeta();pushToast('Save imported','#8f8');}

 }catch(e){pushToast('Invalid code','#f88')}
}

/* ---------------- AUDIO (WebAudio synth) ---------------- */
let AC=null,musNext=0,musStep=0,masterG=null;
function audioInit(){
 if(AC)return;
 try{AC=new (window.AudioContext||window.webkitAudioContext)();
  masterG=AC.createGain();masterG.gain.value=0.9;masterG.connect(AC.destination);
 }catch(e){AC=null}
}
function audioResume(){if(AC&&AC.state==='suspended')AC.resume()}
function tone(f,dur,type,vol,slide,delay){
 if(!AC||!meta||meta.settings.mute)return;
 type=type||'square';vol=vol||0.07;slide=slide||0;delay=delay||0;
 const t=AC.currentTime+delay,o=AC.createOscillator(),g=AC.createGain();
 o.type=type;o.frequency.setValueAtTime(Math.max(20,f),t);
 if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(20,f+slide),t+dur);
 g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
 o.connect(g);g.connect(masterG);o.start(t);o.stop(t+dur+0.03);
}
function hush(dur,vol,delay){ // filtered noise burst
 if(!AC||!meta||meta.settings.mute)return;
 dur=dur||0.15;vol=vol||0.1;delay=delay||0;
 const t=AC.currentTime+delay,len=Math.max(1,(dur*AC.sampleRate)|0);
 const buf=AC.createBuffer(1,len,AC.sampleRate),d=buf.getChannelData(0);
 for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);
 const s=AC.createBufferSource(),g=AC.createGain(),fl=AC.createBiquadFilter();
 fl.type='lowpass';fl.frequency.value=900;
 s.buffer=buf;g.gain.value=vol;s.connect(fl);fl.connect(g);g.connect(masterG);s.start(t);
}

const MUSIC=[

function musicTick(){
 if(!AC||!meta||meta.settings.mute)return;
 if(!(G.scene==='game'||G.scene==='cards'||G.scene==='pause'))return;
 const m=MUSIC[clamp(G.biome,0,4)],spb=60/m.bpm/4;
 if(musNext<AC.currentTime)musNext=AC.currentTime+0.05;
 while(musNext<AC.currentTime+0.25){
  const st=musStep%16;
  const semis=m.arp[st];
  const f=m.root*2*Math.pow(2,semis/12);
  const dl=musNext-AC.currentTime;
  tone(f,spb*0.9,'square',0.022,0,dl);
  if(st%4===0){const b=m.root*Math.pow(2,m.bass[(musStep>>2)%4]/12);tone(b,spb*3.4,'triangle',0.05,0,dl)}
  if(G.bossFight&&st%2===0)tone(m.root/2,spb*1.6,'sawtooth',0.02,0,dl);
  musNext+=spb;musStep++;
 }
}

function mkCv(w,h){const c=document.createElement('canvas');c.width=w;c.height=h;return c}
function spriteFromMap(rows,pal){
 const w=Math.max(...rows.map(r=>r.length)),h=rows.length,c=mkCv(w,h),x=c.getContext('2d');
 for(let j=0;j<h;j++)for(let i=0;i<rows[j].length;i++){const ch=rows[j][i];
  if(ch!=='.'&&pal[ch]){x.fillStyle=pal[ch];x.fillRect(i,j,1,1)}}
 return c;
}
function flipped(c){const f=mkCv(c.width,c.height),x=f.getContext('2d');x.translate(c.width,0);x.scale(-1,1);x.drawImage(c,0,0);return f}
function scaled(c,s){const f=mkCv(c.width*s,c.height*s),x=f.getContext('2d');x.imageSmoothingEnabled=false;x.drawImage(c,0,0,f.width,f.height);return f}

const T_WALL=0,T_FLOOR=1,T_HAZ=2,T_CRACK=3,T_EXIT=4;
function tileAt(px,py){
 const tx=px/TS|0,ty=py/TS|0;
 if(tx<0||ty<0||tx>=mapW||ty>=mapH)return T_WALL;
 return tiles[ty*mapW+tx];
}
function solidAt(px,py){const t=tileAt(px,py);return t===T_WALL||t===T_CRACK}
function setTile(tx,ty,v){if(tx>0&&ty>0&&tx<mapW-1&&ty<mapH-1)tiles[ty*mapW+tx]=v}
function carveRect(x,y,w,h){for(let j=y;j<y+h;j++)for(let i=x;i<x+w;i++)setTile(i,j,T_FLOOR)}
function carveRoom(r){
 if(r.shape==='round'){
  const cx=r.x+r.w/2,cy=r.y+r.h/2,rx=r.w/2,ry=r.h/2;
  for(let j=r.y;j<r.y+r.h;j++)for(let i=r.x;i<r.x+r.w;i++){
   const dx=(i+0.5-cx)/rx,dy=(j+0.5-cy)/ry;
   if(dx*dx+dy*dy<=1.02)setTile(i,j,T_FLOOR);
  }
 }else if(r.shape==='cross'){
  const bx=Math.max(2,r.w>>2),by=Math.max(2,r.h>>2);
  carveRect(r.x+bx,r.y,r.w-bx*2,r.h);
  carveRect(r.x,r.y+by,r.w,r.h-by*2);
 }else if(r.shape==='notch'){
  carveRect(r.x,r.y,r.w,r.h);
  const nw=Math.max(2,r.w>>2)+1,nh=Math.max(2,r.h>>2)+1;
  const nx=src(0.5)?r.x:r.x+r.w-nw,ny=src(0.5)?r.y:r.y+r.h-nh;
  for(let j=ny;j<ny+nh;j++)for(let i=nx;i<nx+nw;i++)setTile(i,j,T_WALL);
 }else carveRect(r.x,r.y,r.w,r.h);
}
function corridor(x1,y1,x2,y2,crack){
 // L-corridor, 2 wide; crack => middle segment sealed with cracked wall
 const pts=[];
 let x=x1,y=y1;
 while(x!==x2){pts.push([x,y]);x+=x2>x?1:-1}
 while(y!==y2){pts.push([x,y]);y+=y2>y?1:-1}
 pts.push([x2,y2]);
 pts.forEach(([i,j],idx)=>{
  const mid=crack&&idx>=(pts.length>>1)-1&&idx<=(pts.length>>1)+1;
  const v=mid?T_CRACK:T_FLOOR;
  setTile(i,j,v);setTile(i+1,j,v);setTile(i,j+1,v);setTile(i+1,j+1,v);
 });
}
function roomCenter(r){return {x:(r.x+r.w/2)*TS,y:(r.y+r.h/2)*TS}}
function randInRoom(r,pad){pad=pad||2;
 for(let k=0;k<24;k++){
  const x=(r.x+pad+R()*(r.w-pad*2))*TS,y=(r.y+pad+R()*(r.h-pad*2))*TS;
  const t=tileAt(x,y);
  if(t!==T_WALL&&t!==T_CRACK)return {x,y};
 }
 return roomCenter(r);
}

function genFloor(){
 R=mulberry32((G.seed^((G.depth+1)*2654435761))>>>0);
 enemies=[];shots=[];eshots=[];pickups=[];props=[];pools=[];lights=[];dnums=[];
 G.bossFight=false;G.boss=null;

 const B=curB();
 if(G.town){genTown();return}
 if(isBoss){
  mapW=34;mapH=30;tiles=new Uint8Array(mapW*mapH); // all wall
  if(B.over){ // open-air arena: a great clearing with boulders
   const cx=mapW/2,cy=mapH/2;
   for(let j=0;j<mapH;j++)for(let i=0;i<mapW;i++){
    const dx=(i+0.5-cx)/(mapW/2-3),dy=(j+0.5-cy)/(mapH/2-3);

   }
   for(const [px,py] of [[9,9],[mapW-11,9],[9,mapH-11],[mapW-11,mapH-11]]){
    setTile(px,py,T_WALL);setTile(px+1,py,T_WALL);
   }
  }else{
   carveRect(4,4,mapW-8,mapH-8);
   for(const [px,py] of [[9,9],[mapW-11,9],[9,mapH-11],[mapW-11,mapH-11]]){
    setTile(px,py,T_WALL);setTile(px+1,py,T_WALL);setTile(px,py+1,T_WALL);setTile(px+1,py+1,T_WALL);
   }
   addWallTorches(10);
  }
  rooms=[{x:3,y:3,w:mapW-6,h:mapH-6,type:'boss',seen:true,pat:2}];
  buildRoomIdx();
  P.x=mapW*TS/2;P.y=(mapH-7)*TS;
  if(P.buddy){P.buddy.x=P.x+14;P.buddy.y=P.y+8}
  spawnBoss(G.biome, mapW*TS/2, 9*TS);
  bakeFloor();

  return;
 }
 if(B.over){genLeg();return}
 mapW=CFG.mapW;mapH=CFG.mapH;
 tiles=new Uint8Array(mapW*mapH);
 rooms=[];
 let tries=0;
 while(rooms.length<sri(9,11)&&tries<300){
  tries++;
  const w=sri(8,13),h=sri(7,12),x=sri(2,mapW-w-3),y=sri(2,mapH-h-3);
  if(rooms.some(r=>x<r.x+r.w+2&&x+w+2>r.x&&y<r.y+r.h+2&&y+h+2>r.y))continue;
  rooms.push({x,y,w,h,type:'',seen:false});
 }
 rooms.forEach((r,i)=>{
  r.shape=i===0?'rect':srp(['rect','rect','rect','round','round','cross','notch']);
  r.pat=sri(0,3);
  carveRoom(r);
 });
 // connect: each room to nearest previous
 for(let i=1;i<rooms.length;i++){
  let best=-1,bd=1e9;const ci=roomCenter(rooms[i]);
  for(let j=0;j<i;j++){const cj=roomCenter(rooms[j]);const d=dist(ci.x,ci.y,cj.x,cj.y);if(d<bd){bd=d;best=j}}
  const a=rooms[i],b=rooms[best];
  corridor((a.x+a.w/2|0),(a.y+a.h/2|0),(b.x+b.w/2|0),(b.y+b.h/2|0),false);
 }
 // one extra loop
 if(rooms.length>5){const a=srp(rooms),b=srp(rooms);if(a!==b)
  corridor((a.x+a.w/2|0),(a.y+a.h/2|0),(b.x+b.w/2|0),(b.y+b.h/2|0),false)}
 // assign special rooms by distance from spawn
 const spawn=rooms[0];spawn.type='spawn';spawn.seen=true;
 const sc=roomCenter(spawn);
 const sorted=rooms.slice(1).sort((a,b)=>{
  const ca=roomCenter(a),cb=roomCenter(b);
  return dist(sc.x,sc.y,cb.x,cb.y)-dist(sc.x,sc.y,ca.x,ca.y)});
 const exitR=sorted[0];exitR.type='exit';
 const keyR=sorted[1]||sorted[0];if(keyR.type==='')keyR.type='key';
 const pool=sorted.slice(2).filter(r=>r.type==='');
 const take=t=>{const r=pool.pop();if(r)r.type=t;return r};
 take('treasure');

  const c=roomCenter(secretR),near=rooms.filter(r=>r!==secretR&&r.type!=='secret')
   .sort((a,b)=>{const ca=roomCenter(a),cb=roomCenter(b);return dist(c.x,c.y,ca.x,ca.y)-dist(c.x,c.y,cb.x,cb.y)})[0];
  corridor((secretR.x+secretR.w/2|0),(secretR.y+secretR.h/2|0),(near.x+near.w/2|0),(near.y+near.h/2|0),true);
 }
 // pillar halls in some plain rectangular rooms
 for(const r of rooms){
  if(r.type!==''||r.shape!=='rect'||r.w<9||r.h<9||!src(0.55))continue;
  r.pillared=true;

   if(Math.abs(i-cx)<2||Math.abs(j-cy)<2)continue;

  // hazards
  if(r.type!=='shop'&&r.type!=='secret'&&src(0.55)){
   const n=sri(2,5);
   for(let i=0;i<n;i++){const tx=sri(r.x+1,r.x+r.w-2),ty=sri(r.y+1,r.y+r.h-2);
    if(tiles[ty*mapW+tx]===T_FLOOR&&Math.abs(tx*TS-c.x)+Math.abs(ty*TS-c.y)>20)setTile(tx,ty,T_HAZ)}

  if(r.type!=='shop'&&r.type!=='secret'&&r.type!=='shrine'){
   const n=sri(2,3)+Math.min(4,(G.depth*0.7)|0);
   for(let i=0;i<n;i++){const p=randInRoom(r);spawnEnemy(pickEnemyType(),p.x,p.y)}

   props.push({type:'torch',x:tx*TS+TS/2,y:ty*TS+TS-2,fl:R()*6});

function bakeFloor(){
 const B=curB();
 const R2=mulberry32((G.seed^(G.depth*97))>>>0);
 for(let f=0;f<2;f++){
  const c=mkCv(mapW*TS,mapH*TS),x=c.getContext('2d');
  const R3=mulberry32((G.seed^(G.depth*97))>>>0); // identical noise both frames
  x.fillStyle=B.wall;x.fillRect(0,0,c.width,c.height);
  for(let ty=0;ty<mapH;ty++)for(let tx=0;tx<mapW;tx++){
   const t=tiles[ty*mapW+tx],px=tx*TS,py=ty*TS;
   const rA=R3(),rB=R3(),rC=R3();
   if(t===T_WALL){
    // face highlight if floor below
    if(ty+1<mapH&&tiles[(ty+1)*mapW+tx]!==T_WALL&&tiles[(ty+1)*mapW+tx]!==T_CRACK){
     x.fillStyle=B.wallTop;x.fillRect(px,py+TS-5,TS,5);
     x.fillStyle=shade(B.wallTop,-0.35);x.fillRect(px,py+TS-1,TS,1);
     if(rA<0.16&&!curB().over)drawWallDecor(x,px,py,rB,rC);
     if(curB().over){ // canopy / crag texture from biome palette
      x.fillStyle=shade(B.wallTop,0.12);x.fillRect(px+2+(rB*8|0),py+2+(rC*6|0),3,2);
      if(rA<0.3){x.fillStyle=shade(B.wall,-0.3);x.fillRect(px+6,py+TS-5,3,4)}
     }
    }
    if(rA<0.1){x.fillStyle=shade(B.wall,0.08);x.fillRect(px+(rB*12|0),py+(rC*10|0),2,2)}
    continue;
   }
   if(t===T_CRACK){
    x.fillStyle=shade(B.wall,0.12);x.fillRect(px,py,TS,TS);
    x.fillStyle=shade(B.wall,-0.3);
    x.fillRect(px+3,py+2,2,6);x.fillRect(px+5,py+8,2,5);x.fillRect(px+9,py+4,2,8);
    continue;
   }
   // floor base — per-room pattern
   const rmi=roomIdx?roomIdx[ty*mapW+tx]:-1;
   const room=rmi>=0?rooms[rmi]:null;
   const pat=room?room.pat:0;
   let dark;
   if(pat===1)dark=(((ty%2?tx+1:tx)>>1)+ty)%2;      // brickwork
   else if(pat===2)dark=((tx>>1)+(ty>>1))%2;         // large 2x2 slabs
   else if(pat===3)dark=(((tx+ty)>>1))%2;            // diagonal bands
   else dark=(tx+ty)%2;                              // checker
   x.fillStyle=dark?B.f1:B.f2;x.fillRect(px,py,TS,TS);
   x.fillStyle=B.grout;x.fillRect(px,py,TS,1);x.fillRect(px,py,1,TS);
   if(pat===2){ // slab joints every 2 tiles
    if(tx%2===0){x.fillStyle=shade(B.grout,-0.15);x.fillRect(px,py,1,TS)}
    if(ty%2===0){x.fillStyle=shade(B.grout,-0.15);x.fillRect(px,py,TS,1)}
   }
   if(rA<0.14){x.fillStyle=shade(B.f1,rB<0.5?0.07:-0.09);x.fillRect(px+(rB*12|0)+1,py+(rC*12|0)+1,2+(rA*20|0)%3,2)}
   // room-type inlays
   if(room&&t===T_FLOOR){
    if(room.type==='treasure'||room.type==='secret'){
     x.fillStyle='rgba(255,190,70,0.06)';x.fillRect(px,py,TS,TS);
     if((tx+ty)%3===0){x.fillStyle='rgba(255,205,95,0.3)';x.fillRect(px+7,py+7,2,2)}
    }else if(room.type==='shrine'){
     x.fillStyle='rgba(150,90,255,0.07)';x.fillRect(px,py,TS,TS);
     if(rB<0.22){x.fillStyle='rgba(175,115,255,0.35)';
      const ox=2+(rC*9|0),oy=2+(rA*90|0)%9;
      x.fillRect(px+ox,py+oy+1,3,1);x.fillRect(px+ox+1,py+oy,1,3)}
    }else if(room.type==='shop'){
     const c2=roomCenter(room);
     if(Math.abs(px+8-c2.x)<30&&Math.abs(py+8-c2.y)<22){
      x.fillStyle='rgba(150,45,45,0.24)';x.fillRect(px,py,TS,TS);
      x.fillStyle='rgba(215,165,85,0.22)';x.fillRect(px,py,TS,1);x.fillRect(px,py+TS-1,TS,1);
     }
    }else if(room.type==='exit'){
     x.fillStyle='rgba(255,216,96,0.035)';x.fillRect(px,py,TS,TS);
    }
   }
   // biome floor decals
   if(t===T_FLOOR&&rA>0.9)drawFloorDecal(x,px,py,rB,rC,f);
   // edge ambient occlusion (soft shadow along walls)
   if(t===T_FLOOR){
    x.fillStyle='rgba(6,5,12,0.3)';
    if(ty>0&&tiles[(ty-1)*mapW+tx]===T_WALL)x.fillRect(px,py,TS,4);
    if(tx>0&&tiles[ty*mapW+tx-1]===T_WALL)x.fillRect(px,py,3,TS);
    if(tx<mapW-1&&tiles[ty*mapW+tx+1]===T_WALL)x.fillRect(px+TS-3,py,3,TS);
    if(ty<mapH-1&&tiles[(ty+1)*mapW+tx]===T_WALL)x.fillRect(px,py+TS-2,TS,2);
   }
   if(t===T_HAZ)drawHazTile(x,px,py,f,R2);
   if(t===T_EXIT){/* exit drawn as prop */}
  }
  floorCvs[f]=c;
 }
 // static lights from hazard lava/crystals
 if(curB().haz==='lava'){
  for(let ty=0;ty<mapH;ty++)for(let tx=0;tx<mapW;tx++)
   if(tiles[ty*mapW+tx]===T_HAZ&&(tx+ty)%2===0)
    lights.push({x:tx*TS+8,y:ty*TS+8,r:34,i:0.55,col:'255,110,30',flick:true});
 }
 if(G.biome===1){for(const pr of props)if(pr.type==='torch'&&R2()<0.5){/* keep */}}
}

function heroDmg(){
 let d=P.dmg*(P.berserk>0?1.5:1);
 if(P.adrenaline)d*=1+0.02*Math.max(0,P.maxhp-P.hp);
 return d;
}
function scoreTarget(e){
 const d=dist(P.x,P.y,e.x,e.y);
 if(d>260||e.dead||e.invuln)return -1e9;
 let s=-d;
 if(e.st==='windup'||e.st==='charge'||e.st==='fuse')s+=45;
 if(e.hp<e.maxhp*0.3)s+=26;
 if(e.x>G.camX&&e.x<G.camX+VW&&e.y>G.camY&&e.y<G.camY+VH)s+=32;
 if(e===P.target)s+=34;
 if(e.type==='gen')s+=12;
 if(e.barrel)s-=600;
 if(!losClear(P.x,P.y-4,e.x,e.y-e.h/2))s-=800;
 return s;
}
function losClear(x1,y1,x2,y2){
 const d=dist(x1,y1,x2,y2),st=Math.max(1,(d/7)|0);
 for(let i=1;i<st;i++){const t=i/st;
  if(solidAt(x1+(x2-x1)*t,y1+(y2-y1)*t))return false}
 return true;
}

function playerAttack(){
 const e=P.target;if(!e)return;
 const d=dist(P.x,P.y,e.x,e.y);
 const seen=losClear(P.x,P.y-4,e.x,e.y-e.h/2);
 // warrior: hurl a spinning blade at mid-range so auto-fire never idles
 if(P.cls==='warrior'&&d>P.range&&d<=170&&seen){
  P.atkT=P.rate*1.15/(P.berserk>0?1.35:1);
  P.face=e.x>=P.x?1:-1;
  const a2=ang(P.x,P.y-4,e.x,e.y-e.h/2);
  SFX.shoot();
  shots.push({x:P.x,y:P.y-4,vx:Math.cos(a2)*195,vy:Math.sin(a2)*195,
   dmg:Math.max(1,heroDmg()*0.75),pierce:0,bounce:0,size:3,life:1.1,col:'#e8b0a0',homing:2.5,hitset:new Set()});
  return;
 }
 if(d>P.range)return;
 if(!seen&&P.cls!=='warrior')return; // don't waste shots into walls
 P.atkT=P.rate/(P.berserk>0?1.35:1);
 P.face=e.x>=P.x?1:-1;
 const a=ang(P.x,P.y,e.x,e.y);
 if(P.cls==='warrior'){
  SFX.slash();
  const arc=P.tier>=3?TAU:(P.tier>=2?2.4:1.5);
  const rad=P.tier>=2?34:30;
  // slash fx
  for(let i=0;i<8;i++){const t=a-arc/2+arc*(i/7);
   addP(P.x+Math.cos(t)*rad*0.8,P.y+Math.sin(t)*rad*0.8,Math.cos(t)*30,Math.sin(t)*30,0.16,
    P.tier>=4?'#ff9040':'#e8e8f0',2)}
  for(const en of enemies){
   const dd=dist(P.x,P.y,en.x,en.y);if(dd>rad+en.r)continue;
   let da=Math.atan2(en.y-P.y,en.x-P.x)-a;
   while(da>Math.PI)da-=TAU;while(da<-Math.PI)da+=TAU;
   if(Math.abs(da)<=arc/2+0.3){
    const crit=Math.random()<P.crit;
    hitEnemy(en,heroDmg()*(crit?2:1)*(P.tier>=2?1.2:1),crit,'melee');
    if(P.tier>=4)en.burn=Math.max(en.burn||0,2);
    if(P.frostShots)en.slow=1.2;
   }
  }
 }else if(P.cls==='ranger'){
  SFX.shoot();
  let n=(P.tier>=3?3:(P.tier>=2?2:1))+P.projN-1;
  const spread=n>1?0.42:0;
  for(let i=0;i<n;i++){const off=n>1?-spread/2+spread*(i/(n-1)):0;
   fireShot(a+off,{spd:200,size:3,pierce:P.pierce+(P.tier>=4?1:0),col:'#cfe8a0'})}
 }else if(P.cls==='wizard'){
  SFX.cast();
  const n=P.projN;
  for(let i=0;i<n;i++)fireShot(a+(i-(n-1)/2)*0.3,
   {spd:P.tier>=4?250:165,size:4,pierce:P.pierce+1,col:'#8ab6ff',chainZap:P.tier>=2});
 }else{ // valkyrie: returning spear
  SFX.shoot();
  const n=(P.tier>=3?2:1)+P.projN-1;
  for(let i=0;i<n;i++){
   const off=(i-(n-1)/2)*0.35;
   shots.push({x:P.x,y:P.y-4,vx:Math.cos(a+off)*185,vy:Math.sin(a+off)*185,
    dmg:heroDmg()*1.15,pierce:99,bounce:0,size:4.2*P.projSize,life:0.52,col:'#ffe08a',
    homing:0,hitset:new Set(),spear:true,ret:false,chainZap:P.tier>=4});
  }
 }
}
function chainZapFrom(x,y,dmg,hops,exclude){
 let last={x,y},ex=exclude||new Set();
 for(let h=0;h<hops;h++){
  let best=null,bd=80;
  for(const e of enemies){if(ex.has(e)||e.dead||e.invuln)continue;
   const d=dist(last.x,last.y,e.x,e.y);if(d<bd){bd=d;best=e}}
  if(!best)break;
  ex.add(best);
  zapLine(last.x,last.y,best.x,best.y);
  hitEnemy(best,dmg,false,'zap');
  last=best;
 }
}
function zapLine(x1,y1,x2,y2){
 const n=Math.max(3,dist(x1,y1,x2,y2)/8|0);
 for(let i=0;i<=n;i++){const t=i/n;
  addP(lerp(x1,x2,t)+rr(-3,3),lerp(y1,y2,t)+rr(-3,3),0,0,0.14,'#bce0ff',1.6)}
 SFX.zap();
}
function hitEnemy(e,dmg,crit,src){
 if(e.dead||e.invuln)return;
 if(e.armored)dmg=Math.max(1,dmg-2);
 dmg=Math.round(dmg);

function rollCards(n){
 const out=[],pool=CARDS.filter(c=>!c.ok||c.ok());
 let guard=0;
 while(out.length<n&&guard<200){
  guard++;
  const roll=Math.random()*100-P.luck*4;
  const want=roll<2?3:roll<12?2:roll<38?1:0;
  const cands=pool.filter(c=>c.r===Math.min(want,3)&&!out.includes(c));
  const c=cands.length?rp(cands):rp(pool.filter(c=>!out.includes(c)));
  if(c&&!out.includes(c))out.push(c);
 }
 return out;
}

 if(e.frozen>0){e.frozen-=dt;return}
 if(e.slow>0)e.slow-=dt;
 if(e.burn>0){e.burn-=dt;if((e.burn*10|0)%4===0)addP(e.x+rr(-4,4),e.y-e.h+rr(-2,2),0,-rr(15,30),0.3,'#ff9040',2);
  e.burnTick=(e.burnTick||0)+dt;if(e.burnTick>0.5){e.burnTick=0;e.hp-=1;addDmg(e.x,e.y-e.h,1,false);if(e.hp<=0){killEnemy(e);return}}}
 if(e.barrel)return;
 const dP=dist(e.x,e.y,P.x,P.y),aP=ang(e.x,e.y,P.x,P.y);
 e.face=P.x>=e.x?1:-1;
 if(e.mods&&e.mods.fiery&&rc(0.06))addP(e.x+rr(-5,5),e.y,0,-rr(8,20),0.4,'#ff8030',2);
 switch(e.type){
  case 'gen':{
   e.spawnCd-=dt;
   if(e.spawnCd<=0&&enemies.reduce((n,o)=>n+(o.barrel?0:1),0)<CFG.enemyCap&&dP<250){
    e.spawnCd=rr(2.4,3.6);
    const t=pickEnemyTypeUnseeded();
    spawnEnemy(t,e.x+rr(-14,14),e.y+rr(-14,14),{fromGen:true});
   }
   break;}
  case 'grunt': case 'spider': case 'golemite': case 'tank':{
   if(dP<230)moveEnemy(e,Math.cos(aP),Math.sin(aP),dt);
   break;}
  case 'archer':{
   if(dP>115)moveEnemy(e,Math.cos(aP),Math.sin(aP),dt);
   else if(dP<70)moveEnemy(e,-Math.cos(aP),-Math.sin(aP),dt);
   e.shootT-=dt;
   if(e.shootT<=0&&dP<200){e.st='windup';e.wt=0.45;e.shootT=rr(1.8,2.8)}
   if(e.st==='windup'){e.wt-=dt;if(e.wt<=0){e.st='idle';
    eshot(e.x,e.y-4,ang(e.x,e.y,P.x,P.y),95,e.dmg,'#c0ff70');SFX.shoot()}}
   break;}
  case 'ghost':{
   e.alpha=0.35+0.45*(0.5+0.5*Math.sin(e.t*1.6));
   e.invuln=e.alpha<0.55;
   const wob=Math.sin(e.t*3)*0.5;
   moveEnemy(e,Math.cos(aP+wob),Math.sin(aP+wob),dt);
   break;}
  case 'bomber':{
   if(e.st==='fuse'){e.wt-=dt;
    if((e.wt*12|0)%2===0)e.flash=0.05;
    if(e.wt<=0){e.dead=true;explosion(e.x,e.y,30,e.dmg,false);G.kills++}
   }else{
    moveEnemy(e,Math.cos(aP),Math.sin(aP),dt);
    if(dP<26){e.st='fuse';e.wt=0.7;SFX.spawn()}
   }
   break;}
 }
 if(e.boss)bossAI(e,dt,dP,aP);
 // contact damage
 if(e.touch||e.boss){
  e.touchCd-=dt;
  if(e.touchCd<=0&&dP<e.r+P.r+2&&!(e.type==='ghost'&&e.invuln)){
   e.touchCd=0.7;damageP(e.dmg,e);
   if(e.mods&&e.mods.frozen)P.slowT=1.2;
   if(e.mods&&e.mods.vampiric){e.hp=Math.min(e.maxhp,e.hp+2)}
   if(e.mods&&e.mods.fiery)P.burnT=1.5;
  }
 }
}
function pickEnemyTypeUnseeded(){
 const d=G.depth,opts=['grunt'];
 if(d>=1)opts.push('archer');if(d>=2)opts.push('bomber');
 if(d>=3)opts.push('ghost');if(G.biome===1)opts.push('spider','spider');
 return rp(opts);
}

/* ---------------- BOSSES ---------------- */
function spawnBoss(biome,x,y){
 const base={hp:Math.round(150*(1+biome*0.75)),spd:[26,34,30,20,28][biome],dmg:3+biome,r:14,h:30};
 const e={type:'boss',boss:true,biome,x,y,r:base.r,h:base.h,face:1,
  hp:base.hp,maxhp:base.hp,spd:base.spd,dmg:base.dmg,
  st:'intro',t:0,wt:2,flash:0,dead:false,elite:false,phase:1,burn:0,slow:0,frozen:0,alpha:1,
  spawnT:0,invuln:true,touch:true,touchCd:0,armored:biome===3,split:false,eruptions:[],name:BOSS_NAMES[biome]};
 enemies.push(e);
 G.bossFight=true;G.boss=e;G.bossIntroT=2.2;
 SFX.roar();
 if(biome===0){spawnGenerator(7*TS,7*TS);spawnGenerator((mapW-7)*TS,7*TS)}
 return e;
}
function bossAI(e,dt,dP,aP){
 if(e.st==='intro'){e.wt-=dt;if(e.wt<=0){e.st='walk';e.wt=2;e.invuln=false}return}
 if(e.hp<e.maxhp*0.5&&e.phase===1){e.phase=2;G.trauma=1;SFX.roar();
  burst(e.x,e.y,30,'#ff5040',120);
  if(e.biome===3&&!e.split){e.split=true;
   spawnEnemy('golemite',e.x-24,e.y,{elite:false,noAnim:false});
   spawnEnemy('golemite',e.x+24,e.y,{elite:false,noAnim:false});}
 }
 e.wt-=dt;
 const B=e.biome;
 if(e.st==='walk'){
  if(B===2)moveEnemy(e,Math.cos(aP),Math.sin(aP)+Math.sin(e.t*3)*0.6,dt); // serpentine
  else moveEnemy(e,Math.cos(aP),Math.sin(aP),dt);
  if(e.wt<=0){
   if(B===0)startAtk(e,'fan',0.5);
   else if(B===1)startAtk(e,rp(['spit','chargeTel','spit']),0.5);
   else if(B===2)startAtk(e,'breath',0.5);
   else if(B===3)startAtk(e,'slam',0.8);
   else startAtk(e,'tele',0.4);
  }
 }else if(e.st==='fan'){
  if(e.wt<=0){
   const n=e.phase===2?13:9;
   for(let i=0;i<n;i++)eshot(e.x,e.y,aP-1.1+2.2*(i/(n-1)),85,e.dmg,'#e8e2cc',{size:4});
   SFX.shoot();e.fanN=(e.fanN||0)+1;
   if(e.fanN%2===0){e.st='walk';e.wt=e.phase===2?1.4:2.2}else{e.st='fan';e.wt=0.5}
  }
 }else if(e.st==='spit'){
  if(e.wt<=0){
   for(let i=0;i<3;i++){const a=aP+rr(-0.4,0.4);
    eshot(e.x,e.y,a,rr(60,90),e.dmg,'#78b040',{pool:'poison',size:4})}
   SFX.shoot();e.st='walk';e.wt=e.phase===2?1.2:2;
   if(e.phase===2)spawnEnemy('spider',e.x+rr(-16,16),e.y+rr(-16,16),{fromGen:true});
  }
 }else if(e.st==='chargeTel'){
  if(e.wt<=0){e.st='charging';e.wt=0.7;e.chA=aP;SFX.roar()}
  else if((e.wt*10|0)%2===0)e.flash=0.05;
 }else if(e.st==='charging'){
  moveEnemy(e,Math.cos(e.chA)*3.2,Math.sin(e.chA)*3.2,dt);
  if(e.wt<=0){e.st='walk';e.wt=1.6}
 }else if(e.st==='breath'){
  if(e.wt<=0){e.st='breathing';e.wt=1;e.bT=0}
 }else if(e.st==='breathing'){
  e.bT+=dt;
  if((e.bT*16|0)!==((e.bT-dt)*16|0)){
   eshot(e.x,e.y,ang(e.x,e.y,P.x,P.y)+rr(-0.35,0.35),110,e.dmg,'#cfeaff',{slow:true,size:3.5});
   SFX.freeze();
  }
  if(e.wt<=0){
   if(e.phase===2)for(let i=0;i<10;i++)eshot(e.x,e.y,i/10*TAU,70,e.dmg,'#cfeaff',{slow:true});
   e.st='walk';e.wt=e.phase===2?1.5:2.4;
  }
 }else if(e.st==='slam'){
  if(e.wt<=0){
   const n=e.phase===2?4:3;
   for(let i=0;i<n;i++){
    const px=clamp(P.x+rr(-40,40),5*TS,(mapW-5)*TS),py=clamp(P.y+rr(-40,40),5*TS,(mapH-5)*TS);
    e.eruptions.push({x:i===0?P.x:px,y:i===0?P.y:py,t:0.85});
   }
   e.st='walk';e.wt=e.phase===2?1.6:2.6;SFX.roar();
  }
 }else if(e.st==='tele'){
  if(e.wt<=0){
   burst(e.x,e.y,14,'#8a6ad0',80);
   const a=rr(0,TAU);e.x=clamp(P.x+Math.cos(a)*70,6*TS,(mapW-6)*TS);e.y=clamp(P.y+Math.sin(a)*70,6*TS,(mapH-6)*TS);
   burst(e.x,e.y,14,'#8a6ad0',80);SFX.cast();
   const pick=rp(e.phase===2?['fan','slam','breath','summon']:['fan','slam','breath']);
   if(pick==='summon'){for(let i=0;i<2;i++)spawnEnemy('ghost',e.x+rr(-20,20),e.y+rr(-20,20),{fromGen:true});e.st='walk';e.wt=1.6}
   else startAtk(e,pick,0.5);
  }
 }
 // eruption resolution (golem + warden)
 for(let i=e.eruptions.length-1;i>=0;i--){const er=e.eruptions[i];
  er.t-=dt;
  if(er.t<=0){e.eruptions.splice(i,1);
   explosion(er.x,er.y,26,e.dmg,false);
   pools.push({x:er.x,y:er.y,r:16,life:4,type:'lava'});
  }
 }
}

/* ---------------- PARTICLES / NUMBERS ---------------- */
function addP(x,y,vx,vy,life,col,size,grav){
 if(parts.length>CFG.partCap*G.partMul)return;
 parts.push({x,y,vx,vy,life,max:life,col,size:size||2,grav:grav||0});
}
function burst(x,y,n,col,spd){
 n=Math.round(n*G.partMul);
 for(let i=0;i<n;i++){const a=rr(0,TAU),s=rr(spd*0.3,spd);
  addP(x,y,Math.cos(a)*s,Math.sin(a)*s,rr(0.25,0.55),col,rr(1.5,3),120)}
}
function addDmg(x,y,n,crit){
 dnums.push({x:x+rr(-4,4),y,vy:-46,txt:''+n,crit,life:0.8});
 if(dnums.length>40)dnums.shift();
}
function ambientParticles(dt){
 const kind=curB().part;
 if(Math.random()>dt*(kind==='snow'||kind==='ember'?26:8)*G.partMul)return;
 const zc=G.zoom||1,vw2=VW/zc,vh2=VH/zc,ox=G.camX-(vw2-VW)/2,oy=G.camY-(vh2-VH)/2;
 const x=ox+rr(0,vw2),y=oy+rr(0,vh2);
 if(kind==='drip')addP(x,oy-4,0,rr(60,110),rr(1,2),'#7a90b8',1.5);
 else if(kind==='firefly')addP(x,y,rr(-8,8),rr(-8,8),rr(1.5,3),'#d8ff70',1.5);
 else if(kind==='snow')addP(x,oy-4,rr(-10,10),rr(20,40),rr(3,5),'#e8f2ff',1.5);
 else if(kind==='ember')addP(x,oy+vh2+4,rr(-8,8),-rr(25,55),rr(2,4),rp(['#ff9040','#ffd860']),1.8);
 else addP(x,y,0,0,rr(1,2.5),'#c0a0ff',1.2); // star twinkle
}

function genLeg(){ // overworld travel leg: a long trail north
 mapW=44;mapH=72;tiles=new Uint8Array(mapW*mapH); // all wall (treeline/rock)

 if(!first)for(let i=0;i<sri(1,2);i++){

  if(tileAt(p[0]*TS,p[1]*TS)===T_FLOOR)spawnGenerator(p[0]*TS+sri(-20,20),p[1]*TS);
 }
 for(let i=0;i<sri(1,2);i++){
  const p=path[sri(2,path.length-2)];
  props.push({type:'chest',x:p[0]*TS+sri(-26,26),y:p[1]*TS,r:8,opened:false,mimic:!first&&src(0.18),rich:false});
 }
 if(!first&&src(0.4)){const p=path[sri(2,path.length-2)];
  props.push({type:'shrine',x:p[0]*TS+sri(-20,20),y:p[1]*TS,r:9})}
 for(let i=0;i<sri(2,4);i++){const p=path[sri(1,path.length-2)];

 // run start: camp, cinematic gear trail
 if(first){

function resumeRun(d){

function playerDeath(){

function dailySeed(){const k=dailyKey();let h=2166136261;for(const ch of k){h^=ch.charCodeAt(0);h=Math.imul(h,16777619)}return h>>>0}
function wipeTo(scene){G.wipe={t:0,dur:0.45,mid:()=>{G.scene=scene}}}

function movePlayer(dt){
 let dx=0,dy=0;
 if(keys['w']||keys['arrowup'])dy-=1;
 if(keys['s']||keys['arrowdown'])dy+=1;
 if(keys['a']||keys['arrowleft'])dx-=1;
 if(keys['d']||keys['arrowright'])dx+=1;
 let mag=1;
 if(joy.mag>0){dx=joy.dx;dy=joy.dy;mag=joy.mag}
 const dl=Math.hypot(dx,dy);
 if(dl>0){dx/=dl;dy/=dl}
 P.moving=dl>0;
 if(P.moving){P.face=dx!==0?(dx>0?1:-1):P.face;P.anim+=dt*8;P.vx=dx;P.vy=dy;
  if(rc(dt*7))addP(P.x+rr(-3,3),P.y+3,rr(-6,6),-rr(3,10),0.4,shade(curB().f2,0.25),1.8)}
 let spd=P.spd*mag;
 if(P.rollT>0){dx=P.rollDx;dy=P.rollDy;spd=P.spd*2.6;P.moving=true;
  if(rc(0.5))addP(P.x,P.y+4,rr(-10,10),rr(-5,5),0.3,'#8a86a8',2)}
 const onIce=tileAt(P.x,P.y)===T_HAZ&&curB().haz==='ice';
 if(onIce){
  P.iceVx=lerp(P.iceVx||0,dx*spd,dt*2.5);P.iceVy=lerp(P.iceVy||0,dy*spd,dt*2.5);
 }else{P.iceVx=dx*spd;P.iceVy=dy*spd}
 if(P.slowT>0){P.slowT-=dt;P.iceVx*=0.55;P.iceVy*=0.55}
 const nx=P.x+P.iceVx*dt,ny=P.y+P.iceVy*dt;
 if(!solidAt(nx-P.r,P.y-2)&&!solidAt(nx+P.r,P.y-2)&&!solidAt(nx-P.r,P.y+3)&&!solidAt(nx+P.r,P.y+3))P.x=nx;
 if(!solidAt(P.x-P.r,ny-2)&&!solidAt(P.x+P.r,ny-2)&&!solidAt(P.x-P.r,ny+3)&&!solidAt(P.x+P.r,ny+3))P.y=ny;
 P.x=clamp(P.x,TS,mapW*TS-TS);P.y=clamp(P.y,TS,mapH*TS-TS);
}
function playerHazards(dt){
 const t=tileAt(P.x,P.y+2),hz=curB().haz;
 if(t===T_HAZ){
  if(hz==='spikes'&&G.spikeT>1.3&&G.spikeT<2.0){if(!P.spikeHit){P.spikeHit=true;damageP(1,'spikes')}}
  else P.spikeHit=false;
  if(hz==='poison'){P.poison=Math.max(P.poison,1.5)}
  if(hz==='lava'){P.lavaTick=(P.lavaTick||0)+dt;if(P.lavaTick>0.45){P.lavaTick=0;damageP(1,'lava');P.burnT=1}}
  if(hz==='void'){P.voidTick=(P.voidTick||0)+dt;if(P.voidTick>0.6){P.voidTick=0;damageP(1,'void')}
   if(rc(0.15))addP(P.x+rr(-5,5),P.y,0,-rr(10,26),0.5,'#a070ff',1.5)}
 }else P.spikeHit=false;
 if(P.poison>0){P.poison-=dt;P.poisonTick=(P.poisonTick||0)+dt;
  if(P.poisonTick>1){P.poisonTick=0;damageP(1,'poison')}
  if(rc(0.1))addP(P.x+rr(-5,5),P.y-8,0,-rr(8,18),0.4,'#78b040',2)}
 if(P.burnT>0){P.burnT-=dt;if(rc(0.2))addP(P.x+rr(-4,4),P.y-8,0,-rr(12,26),0.3,'#ff9040',2)}
 // hazard pools (boss poison/lava)
 for(let i=pools.length-1;i>=0;i--){const pl=pools[i];
  pl.life-=dt;
  if(pl.life<=0){pools.splice(i,1);continue}
  if(dist(pl.x,pl.y,P.x,P.y)<pl.r+3){
   pl.tick=(pl.tick||0)+dt;
   if(pl.tick>0.5){pl.tick=0;damageP(1,pl.type)}
  }
 }
}
function updateShots(dt){
 for(let i=shots.length-1;i>=0;i--){const s=shots[i];
  s.life-=dt;
  // spear return
  if(s.spear&&!s.ret&&s.life<=0){s.ret=true;s.life=1.5;s.hitset.clear()}
  if(s.ret){
   const a=ang(s.x,s.y,P.x,P.y);
   s.vx=Math.cos(a)*230;s.vy=Math.sin(a)*230;
   if(dist(s.x,s.y,P.x,P.y)<8){shots.splice(i,1);continue}
  }else if(s.homing>0&&P.target&&!P.target.dead){
   const a=ang(s.x,s.y,P.target.x,P.target.y);
   const cur=Math.atan2(s.vy,s.vx);let da=a-cur;
   while(da>Math.PI)da-=TAU;while(da<-Math.PI)da+=TAU;
   const na=cur+clamp(da,-s.homing*dt,s.homing*dt);
   const sp=Math.hypot(s.vx,s.vy);
   s.vx=Math.cos(na)*sp;s.vy=Math.sin(na)*sp;
  }
  s.x+=s.vx*dt;s.y+=s.vy*dt;
  if(s.fireball&&rc(0.5))addP(s.x,s.y,rr(-15,15),rr(-15,15),0.3,rp(['#ff8030','#ffd860']),2.5);
  // walls
  if(solidAt(s.x,s.y)){
   if(s.fireball){explosion(s.x,s.y,30,heroDmg()*1.6,true);shots.splice(i,1);continue}
   if(s.bounce>0&&!s.spear){s.bounce--;
    if(solidAt(s.x-s.vx*dt,s.y))s.vy*=-1;else s.vx*=-1;
    s.x+=s.vx*dt*2;s.y+=s.vy*dt*2;
   }else if(s.spear&&!s.ret){s.ret=true;s.life=1.5;s.hitset.clear()}
   else{burst(s.x,s.y,3,s.col,40);shots.splice(i,1);continue}
  }
  if(s.life<=0&&!s.spear){shots.splice(i,1);continue}
  if(s.life<=-2){shots.splice(i,1);continue}
  // enemy hits
  let consumed=false;
  for(const e of enemies){
   if(e.dead||s.hitset.has(e))continue;
   if(dist(s.x,s.y,e.x,e.y-e.h/2)<s.size+e.r+2||dist(s.x,s.y,e.x,e.y)<s.size+e.r){
    if(e.invuln){continue}
    s.hitset.add(e);
    if(s.fireball){explosion(s.x,s.y,30,heroDmg()*1.6,true);consumed=true;break}
    const crit=Math.random()<P.crit;
    hitEnemy(e,s.dmg*(crit?2:1),crit,'shot');
    if(s.chainZap)chainZapFrom(e.x,e.y,heroDmg()*0.6,2,new Set([e]));
    if(s.pierce>0){s.pierce--}else{consumed=true;break}
   }
  }
  if(consumed){shots.splice(i,1);continue}
  // shooting the food!
  for(let j=pickups.length-1;j>=0;j--){const p=pickups[j];
   if(p.type==='food'&&dist(s.x,s.y,p.x,p.y)<s.size+5){
    pickups.splice(j,1);burst(p.x,p.y,8,'#b06a30',60);
    pushToast("Don't shoot the food!",'#ff9060');SFX.deny();
    if(!s.spear&&s.pierce<=0){shots.splice(i,1)}
    break;
   }}
 }
 for(let i=eshots.length-1;i>=0;i--){const s=eshots[i];
  s.life-=dt;s.x+=s.vx*dt;s.y+=s.vy*dt;
  if(s.life<=0||solidAt(s.x,s.y)){
   if(s.pool)pools.push({x:s.x,y:s.y,r:12,life:3.5,type:'poison'});
   eshots.splice(i,1);continue}
  if(dist(s.x,s.y,P.x,P.y)<s.size+P.r){
   damageP(s.dmg,'shot');
   if(s.slow)P.slowT=1.4;
   if(s.pool)pools.push({x:s.x,y:s.y,r:12,life:3.5,type:'poison'});
   eshots.splice(i,1);
  }
 }
}
function collectPickup(p){
 if(p.type==='coin'){P.gold+=p.v||1;G.goldRun+=p.v||1;SFX.coin()}
 else if(p.type==='gem'){gainXP(p.v||1);SFX.gem()}
 else if(p.type==='food'){healP(3);SFX.food();pushToast('+Food','#7ae87a')}
 else if(p.type==='key'){P.keys++;SFX.key();pushToast('Key acquired!','#ffd860')}
 else if(p.type.startsWith('pot:')){const id=p.type.slice(4);
  if(!addPot(id))return false;SFX.pot();pushToast('+'+POTS[id].name,POTS[id].col)}
 else if(p.type.startsWith('scroll:')){const id=p.type.slice(7);
  P.spell=id;P.spellCd=0;SFX.pot();pushToast('Spell: '+SPELLS[id].name,SPELLS[id].col)}
 else if(p.type==='gear:sword'){P.gearWeapon=true;SFX.lvl();
  pushToast('RUSTY BLADE equipped','#ffd860');pushToast('It has seen better days. It will do.','#a8a4c8')}
 else if(p.type==='gear:torch'){P.gearTorch=true;SFX.pot();
  pushToast('TORCH lit — the dark recedes','#ffb060')}
 else if(p.type==='armor'){
  if(P.armor<3){P.armor++;
   showUpgrade('armor',ARMOR_NAMES[P.armor]+' equipped','Damage taken reduced by '+P.armor)}
  else{P.gold+=20;G.goldRun+=20;SFX.coin();pushToast('Armor scrapped for 20g','#c8c4e8')}
 }
 else if(p.type==='gear:satchel'){P.gearSatchel=true;addPot('heal');P.gold+=15;G.goldRun+=15;SFX.coin();
  pushToast('OLD SATCHEL — a potion and 15 gold','#c8e8a0')}
 return true;
}
function updatePickups(dt){
 for(let i=pickups.length-1;i>=0;i--){const p=pickups[i];
  p.bob=(p.bob||0)+dt*4;
  const d=dist(p.x,p.y,P.x,P.y);
  const magnet=(p.type==='coin'||p.type==='gem')?P.pickupR:12;
  if(d<magnet&&d>6){const a=ang(p.x,p.y,P.x,P.y);const sp=lerp(160,40,d/magnet);
   p.x+=Math.cos(a)*sp*dt;p.y+=Math.sin(a)*sp*dt}
  if(d<8){if(collectPickup(p))pickups.splice(i,1)}
 }

    else{
     G.confirm={text:'HEALER\nRestore all hearts for '+cost+' gold?',
      yes(){if(P.gold<cost){pushToast('Not enough gold','#f88');return}
       P.gold-=cost;P.hp=P.maxhp;P.poison=0;SFX.food();

      no(){pr.cool=G.time}};
     if(pr.cool&&G.time-pr.cool<2)G.confirm=null;
    }

     const need=8+G.biome*3,rw=35+G.biome*25;
     G.confirm={text:'INNKEEP\n"Beasts plague the north road.\nSlay '+need+' for '+rw+' gold?"',
      yes(){pr.offered=true;G.bounty={need,got:0,reward:rw};
       pushToast('Bounty accepted: slay '+need+' beasts','#ffd860');saveRun()},
      no(){pr.offered=true}};
    }else if(!pr.msgT||G.time-pr.msgT>4){pr.msgT=G.time;
     pushToast('Innkeep: "'+rp(['Roads north are worse every season.','A hero passed this way once. Never returned.','Mind the '+ (BIOMES[G.biome+1]?BIOMES[G.biome+1].name:'road')+', friend.','Your run is safe here — rest easy.'])+'"','#e8d8b0')}
   }
  }else if(pr.type==='ware'&&!pr.sold){
   if(dist(pr.x,pr.y,P.x,P.y)<10){
    if(!pr.touchT||G.time-pr.touchT>1.5){
     pr.touchT=G.time;
     if(P.gold<pr.price){pushToast('Need '+pr.price+' gold','#f0b0b0');SFX.deny()}
     else if(pr.kind==='pot:heal'&&P.potions.length>=P.potMax){pushToast('Potion belt is full','#f0b0b0');SFX.deny()}
     else if(pr.kind==='tier'&&P.tier>=4){pushToast('Weapon is already mastered','#f0b0b0');SFX.deny()}
     else{
      P.gold-=pr.price;pr.sold=true;SFX.coin();
      if(pr.kind==='pot:heal')addPot('heal');
      else if(pr.kind==='key'){P.keys++;pushToast('Key purchased','#ffd860')}
      else if(pr.kind==='card'){const c=rp(CARDS.filter(c=>(!c.ok||c.ok())&&c.r<=2));c.go();pushToast(c.n+'!','#c070ff')}
      else if(pr.kind==='tier'){P.tier++;showUpgrade('weapon',tierName(),tierDesc())}
     }
    }
   }
  }
 }
}
function updateWisps(dt){
 for(let i=P.wisps.length-1;i>=0;i--){const w=P.wisps[i];
  w.t-=dt;if(w.t<=0){burst(w.x,w.y,8,'#fff0c0',50);P.wisps.splice(i,1);continue}
  w.a+=dt*2;
  const tx=P.x+Math.cos(w.a)*20,ty=P.y-10+Math.sin(w.a)*12;
  w.x=lerp(w.x,tx,dt*5);w.y=lerp(w.y,ty,dt*5);
  w.shootT-=dt;
  if(w.shootT<=0){
   let best=null,bd=140;
   for(const e of enemies){if(e.dead||e.invuln)continue;const d=dist(w.x,w.y,e.x,e.y);if(d<bd){bd=d;best=e}}
   if(best){w.shootT=0.8;const a=ang(w.x,w.y,best.x,best.y);
    shots.push({x:w.x,y:w.y,vx:Math.cos(a)*180,vy:Math.sin(a)*180,dmg:Math.max(1,heroDmg()*0.5),
     pierce:0,bounce:0,size:2.5,life:1,col:'#fff0c0',homing:3,hitset:new Set()});SFX.shoot()}
   else w.shootT=0.3;
  }
 }
}
function updateGame(dt){
 if(!G.inRun)return;
 G.time+=dt;G.spikeT=(G.spikeT+dt)%2.4;
 G.lavaT+=dt;if(G.lavaT>0.38){G.lavaT=0;G.lavaFrame^=1}
 if(P.hp<=0)return;
 if(G.cine){
  G.cine.t+=dt;
  if(G.cine.t>=G.cine.dur){G.cine=null;
   pushToast('Gather your gear. The way down lies north.','#c8e8a0')}
 }else{
  movePlayer(dt);
 }
 playerHazards(dt);
 // timers
 if(P.inv>0)P.inv-=dt;
 if(P.hurtFlash>0)P.hurtFlash-=dt;
 if(P.rollT>0)P.rollT-=dt;
 if(P.rollCd>0)P.rollCd-=dt;
 if(P.spellCd>0)P.spellCd-=dt;
 if(P.berserk>0)P.berserk-=dt;
 if(P.stone>0)P.stone-=dt;
 if(P.comboT>0){P.comboT-=dt;if(P.comboT<=0)P.combo=0}
 // hard mode drain
 if(meta.settings.hard&&!G.town){G.drainT+=dt;
  if(G.drainT>CFG.hardDrainEvery){G.drainT=0;P.hp--;
   if(P.hp<=0){playerDeath();return}
   if(P.hp===4)pushToast('Your life force ebbs... find food!','#ff9060')}}
 // low hp narrator
 if(P.hp<=Math.ceil(P.maxhp*0.25)&&G.time-G.lowHpT>9){G.lowHpT=G.time;
  pushToast(rp(['Your hero is about to die!','Find food, hero!','Death approaches...']),'#ff7060')}
 // auto-target + attack
 P.retargetT-=dt;
 if(P.retargetT<=0){P.retargetT=0.15;retarget()}
 if(P.atkT>0)P.atkT-=dt;
 if(P.atkT<=0&&P.target&&P.rollT<=0&&!G.cine)playerAttack();
 // wizard tier-3 orbs
 if(P.cls==='wizard'&&P.tier>=3){
  P.orbA+=dt*3.2;
  for(let k=0;k<2;k++){
   const a=P.orbA+k*Math.PI;
   const ox=P.x+Math.cos(a)*18,oy=P.y-6+Math.sin(a)*18;
   if(rc(0.3))addP(ox,oy,0,0,0.2,'#8ab6ff',2);
   for(const e of enemies){if(e.dead||e.invuln)continue;
    if(dist(ox,oy,e.x,e.y)<e.r+4){e.orbCd=e.orbCd||0;
     if(G.time-e.orbCd>0.5){e.orbCd=G.time;hitEnemy(e,Math.max(1,heroDmg()*0.5),false,'orb')}}}
  }
 }
 updateWisps(dt);
 if(P.buddy){const bd=P.buddy;
  bd.anim+=dt*8;
  const want=dist(bd.x,bd.y,P.x,P.y);
  if(want>200){bd.x=P.x+rr(-10,10);bd.y=P.y+rr(-10,10)}
  else if(want>22){const a=ang(bd.x,bd.y,P.x,P.y);
   const sp=Math.min(want*2.4,86);
   const nx=bd.x+Math.cos(a)*sp*dt,ny=bd.y+Math.sin(a)*sp*dt;
   if(!solidAt(nx,ny-2))bd.x=nx;
   if(!solidAt(bd.x,ny-2))bd.y=ny;
   bd.face=P.x>=bd.x?1:-1;bd.moving=true;
  }else bd.moving=false;
  bd.shootT-=dt;
  if(bd.shootT<=0){
   let best=null,bdd=150;
   for(const e of enemies){if(e.dead||e.invuln||e.barrel)continue;
    const d2=dist(bd.x,bd.y,e.x,e.y);
    if(d2<bdd&&losClear(bd.x,bd.y-4,e.x,e.y-e.h/2)){bdd=d2;best=e}}
   if(best){bd.shootT=0.85;bd.face=best.x>=bd.x?1:-1;
    const a=ang(bd.x,bd.y-4,best.x,best.y-best.h/2);
    SFX.shoot();
    shots.push({x:bd.x,y:bd.y-4,vx:Math.cos(a)*200,vy:Math.sin(a)*200,
     dmg:Math.max(1,heroDmg()*0.45),pierce:0,bounce:0,size:2.5,life:1,col:'#a0f0b0',homing:2,hitset:new Set()});
   }else bd.shootT=0.3;
  }
 }
 // enemies
 for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];
  if(e.dead){enemies.splice(i,1);continue}
  updateEnemy(e,dt);
 }
 updateShots(dt);
 updatePickups(dt);
 updateProps(dt);
 // drifting clouds, storm flashes
 if(curB().over&&!G.town){
  for(const c of G.clouds){c.x+=c.vx*dt;c.y+=(c.vy||0)*dt;
   if(c.x<-150)c.x=mapW*TS+150;if(c.x>mapW*TS+150)c.x=-150}
  if(G.biome===1&&rc(dt*0.06)){G.flash=0.5;SFX.roar()}
 }
 if(G.flash>0)G.flash-=dt*1.6;
 // room discovery
 for(const r of rooms)if(!r.seen&&P.x>r.x*TS&&P.x<(r.x+r.w)*TS&&P.y>r.y*TS&&P.y<(r.y+r.h)*TS)r.seen=true;
 // particles
 ambientParticles(dt);
 for(let i=parts.length-1;i>=0;i--){const p=parts[i];
  p.life-=dt;if(p.life<=0){parts.splice(i,1);continue}
  p.vy+=(p.grav||0)*dt;p.x+=p.vx*dt;p.y+=p.vy*dt}
 for(let i=dnums.length-1;i>=0;i--){const d=dnums[i];
  d.life-=dt;d.y+=d.vy*dt;d.vy*=0.92;if(d.life<=0)dnums.splice(i,1)}
 for(let i=toasts.length-1;i>=0;i--){toasts[i].life-=dt;if(toasts[i].life<=0)toasts.splice(i,1)}
 // camera + room-aware zoom
 const lookX=joy.mag>0?joy.dx*26:0,lookY=joy.mag>0?joy.dy*26:0;
 G.camX=lerp(G.camX,P.x-VW/2+lookX,dt*6);
 G.camY=lerp(G.camY,P.y-VH/2+lookY,dt*6);
 // measure how open the space around the player is (throttled raycasts)
 G.openT=(G.openT||0)-dt;
 if(G.openT<=0){G.openT=0.12;
  const rays=[];
  for(let k=0;k<8;k++){
   const a=k*Math.PI/4;let d=10;
   for(;d<=96;d+=6)if(solidAt(P.x+Math.cos(a)*d,P.y-4+Math.sin(a)*d))break;
   rays.push(Math.min(d,96));
  }
  rays.sort((a,b)=>a-b);
  const narrow=(rays[0]+rays[1]+rays[2]+rays[3])/4;
  G.openness=lerp(G.openness||48,narrow,0.5);
 }
 let zt=1;
 if(G.cine){ // intro cinematic: sweep from close-up to wide
  const k=clamp(G.cine.t/G.cine.dur,0,1);
  zt=lerp(2.3,1.15,k*k*(3-2*k));
 }else if(G.bossFight&&G.boss&&!G.boss.dead){zt=G.boss.st==='intro'?1.4:1.05}
 else{ // zoomed-in by default; only narrow passages pull the camera back
  const t2=clamp(((G.openness||48)-16)/(52-16),0,1);
  zt=lerp(0.85,1.55,t2);
  if(G.town)zt=Math.min(zt,1.35);
 }
 G.zoomT=zt;
 G.zoom=lerp(G.zoom||1,G.zoomT,dt*3);
 // clamp camera to what is actually visible at the current zoom
 {const zc=G.zoom||1,hw=VW/(2*zc),hh=VH/(2*zc),slack=40;
  const lox=hw-slack-VW/2,hix=mapW*TS-hw+slack-VW/2;
  const loy=hh-slack-VH/2,hiy=mapH*TS-hh+slack-VH/2;
  G.camX=lox>hix?(lox+hix)/2:clamp(G.camX,lox,hix);
  G.camY=loy>hiy?(loy+hiy)/2:clamp(G.camY,loy,hiy);}
 G.trauma=Math.max(0,G.trauma-dt*1.6);
}

function drawSpr(spr,x,y,alpha,squish){
 g.save();

 g.restore();
}

 btn(VW/2-70,by,140,24,'TITLE',()=>{G.scene='title'});
 drawToastsMenu();
}
function drawWin(){
 const s=G.deathStats;
 g.fillStyle='#0b0a14';g.fillRect(0,0,VW,VH);
 if(rc(0.4))addP(rr(0,VW),-4,rr(-5,5),rr(20,50),rr(2,4),rp(['#ffd860','#ffe9a0','#ff9040']),2);
 for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.life-=STEP;
  if(p.life<=0){parts.splice(i,1);continue}p.x+=p.vx*STEP;p.y+=p.vy*STEP;
  g.fillStyle=p.col;g.fillRect(p.x,p.y,p.size,p.size)}
 txtO('THE GAUNTLET',VW/2,VH*0.18,20,'#ffd860','center',true);
 txtO('IS CONQUERED',VW/2,VH*0.18+24,20,'#ffd860','center',true);
 if(s){
  txt('The Warden falls. The dungeon is silent.',VW/2,VH*0.34,8,'#c8c4e8','center');
  txtO(s.kills+' kills · level '+s.lvl+' · ◆'+s.banked+' banked',VW/2,VH*0.42,10,'#fff','center');
 }
 btn(VW/2-70,VH*0.58,140,28,'SHARE VICTORY',shareResult,{border:'#ffd860'});
 btn(VW/2-70,VH*0.58+36,140,24,'TITLE',()=>{G.scene='title'});
 drawToastsMenu();
}
function drawConfirm(){
 dimBg();
 const pw=Math.min(230,VW-30),lines=G.confirm.text.split('\n');
 const ph=70+lines.length*13,px=VW/2-pw/2,py=VH/2-ph/2;
 panel(px,py,pw,ph);
 lines.forEach((l,i)=>txtO(l,VW/2,py+20+i*13,9,'#e8e4ff','center',i===0));
 btn(px+16,py+ph-32,pw/2-24,24,'YES',()=>{const c=G.confirm;G.confirm=null;c.yes()},{border:'#7ac87a'});
 btn(px+pw/2+8,py+ph-32,pw/2-24,24,'NO',()=>{const c=G.confirm;G.confirm=null;c.no&&c.no()},{border:'#c87a7a'});
}
function drawToastsMenu(){
 toasts.forEach((t,i)=>{
  t.life-=STEP;
  g.globalAlpha=clamp(t.life,0,1);
  txtO(t.t,VW/2,VH-56-i*13,9,t.col,'center',true);
  g.globalAlpha=1;
 });
 for(let i=toasts.length-1;i>=0;i--)if(toasts[i].life<=0)toasts.splice(i,1);
}
function drawWipe(){
 if(!G.wipe)return;
 const w=G.wipe;
 w.t+=STEP;
 const half=w.dur/2;
 if(w.t>=half&&!w.fired){w.fired=true;if(w.mid)w.mid()}
 if(w.t>=w.dur){G.wipe=null;return}
 const p=w.t<half?w.t/half:1-(w.t-half)/half; // 0->1->0
 const maxR=Math.hypot(VW,VH)/2+10;
 const r=maxR*(1-p);
 g.fillStyle='#07070c';
 g.beginPath();
 g.rect(0,0,VW,VH);
 g.arc(VW/2,VH/2,Math.max(0.1,r),0,TAU,true);
 g.fill('evenodd');
}

/* ---------------- MAIN LOOP & BOOT ---------------- */
let lastT=0,acc=0;
function frame(now){
 requestAnimationFrame(frame);
 const t0=performance.now();
 if(!lastT)lastT=now;
 let dt=(now-lastT)/1000;lastT=now;
 dt=Math.min(dt,0.1);
 if(G.hitstop>0){G.hitstop-=dt}
 else{
  acc+=dt;
  let steps=0;
  while(acc>=STEP&&steps<4){
   if(G.scene==='game'&&!G.confirm)updateGame(STEP);
   acc-=STEP;steps++;
  }
  if(steps===4)acc=0;
 }
 musicTick();
 render();
 // adaptive particle budget
 G.frameMs=lerp(G.frameMs,performance.now()-t0,0.05);
 G.partMul=G.frameMs>15?Math.max(0.35,G.partMul-0.01):Math.min(1,G.partMul+0.005);
}
function render(){
 uiBtns=[];
 g.clearRect(0,0,VW,VH);
 g.fillStyle='#07070c';g.fillRect(0,0,VW,VH);
 switch(G.scene){
  case 'title':drawTitle();break;
  case 'pick':drawPick();break;
  case 'sanctum':drawSanctum();break;
  case 'settings':drawSettings();break;
  case 'game':drawWorld();drawHUD();break;
  case 'cards':drawCards();break;
  case 'pause':drawPause();break;
  case 'map':drawMap();break;
  case 'death':drawDeath();break;
  case 'win':drawWin();break;
 }
 if(G.confirm)drawConfirm();
 drawWipe();
 if(meta.settings.crt&&scanCv)g.drawImage(scanCv,0,0);
 dctx.imageSmoothingEnabled=false;
 dctx.clearRect(0,0,cv.width,cv.height);
 dctx.drawImage(L,0,0,VW,VH,0,0,VW*SCALE,VH*SCALE);
}
function boot(){
 loadMeta();
 buildSprites();
 resize();
 G.scene='title';
 requestAnimationFrame(frame);
}
// test hooks
window.DG={get G(){return G},get P(){return P},startRun,genFloor,updateGame,nextFloor,
 loadRun,saveRun,resumeRun,rollCards,SPELLS,CARDS,POTS,spawnEnemy,render,
 pickCard(i){if(G.scene==='cards'&&G.cardChoices[i]){G.cardChoices[i].go();G.scene='game'}},
 get meta(){return meta},CFG,enterTown,leaveTown,TOWNS,
 get enemies(){return enemies},get props(){return props},get pickups(){return pickups},
 get tiles(){return tiles},get mapW(){return mapW},get mapH(){return mapH},
 spawnGenerator,explosion,hitEnemy};
boot();
</script>
